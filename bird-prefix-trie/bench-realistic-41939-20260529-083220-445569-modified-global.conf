log "/dev/null" all;
router id 192.0.2.40;

aspa table at;

filter f {
    if aspa_check(at, bgp_path, true) = ASPA_INVALID then reject;
    accept;
}

protocol static aspa_data {
    aspa { table at; };

    route aspa 100 providers 101, 66100, 66101, 66102, 66103, 66104, 66105, 66106, 66107, 66108;
    route aspa 101 providers 102, 66101, 66102, 66103, 66104, 66105, 66106, 66107, 66108, 66109;
    route aspa 102 providers 103, 66102, 66103, 66104, 66105, 66106, 66107, 66108, 66109, 66110;
}

